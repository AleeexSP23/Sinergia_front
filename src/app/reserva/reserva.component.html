<form (ngSubmit)="onSubmit()">
  <label>Fecha</label>
  <input type="date" [(ngModel)]="date" name="date" (change)="onDateChange()" required />

  <br /><br />

  <label>Hora</label>

  <select [(ngModel)]="hora" name="hora" required>
    <option
      *ngFor="let hora of horasDisponibles"
      [value]="hora"
      [disabled]="horariosOcupados[hora] >= 5"
    >
      {{ hora }}
      <span *ngIf="horariosOcupados[hora] >= 5"> (completo) </span>
    </option>
  </select>

  <br /><br />

  <label>Personas</label>
  <input type="number" [(ngModel)]="personas" name="personas" min="1" max="8"/>

  <br /><br />

  <button *ngIf="!isLogged()" type="submit" routerLink="/login">Inicia sesion para reservar</button>
  <button *ngIf="isLogged()" type="submit">Reservar</button>
</form>

<h2>Reservas</h2>

<div *ngFor="let r of reservas" class="lista-reservas">
  <button *ngIf="isAdmin()" (click)="eliminarReserva(r._id)" class="btn-eliminar">Eliminar</button>
  <p>Fecha: {{ r.date | date: 'dd/MM/yyyy HH:mm' : 'GMT+1' }}</p>
  <p>Personas: {{ r.personas }}</p>
  <hr />
</div>
