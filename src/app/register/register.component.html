<form (ngSubmit)="onSubmit()">
  <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Nombre" required class="nombre"/>
  <input type="email" [(ngModel)]="correo" name="correo" placeholder="Correo" required class="correo"/>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required class="contraseña"/>
  <button type="submit">Registrarse</button>
</form>
